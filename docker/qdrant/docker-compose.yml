version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: llm-qdrant
    ports:
      - "6333:6333"  # HTTP API + Web UI
      - "6334:6334"  # gRPC API (Spring AI 使用)
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      # 日志级别
      - QDRANT__LOG_LEVEL=INFO
      # 启用 API Key 认证（预生产环境）
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY:-K7mN9pQ2rT5vX8zA3bC6dE9fH2jK5mN8pQ3rT6vX9zA2}
      # TLS 配置（根据需要启用）
      - QDRANT__SERVICE__ENABLE_TLS=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - llm-network

volumes:
  qdrant_storage:
    driver: local

networks:
  llm-network:
    driver: bridge

