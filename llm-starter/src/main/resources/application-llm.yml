# LLM 业务配置

llm:
  # 默认配置
  default-provider: ${LLM_DEFAULT_PROVIDER:zhipu}
  default-model: ${LLM_DEFAULT_MODEL:glm-5.1}

  # 阿里云百炼配置（通义千问 / DeepSeek 等）
  alibaba:
    api-key: ${DASHSCOPE_API_KEY:your-api-key-here}
    base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com}
    model: ${DASHSCOPE_MODEL:qwen-plus}
    temperature: ${DASHSCOPE_TEMPERATURE:0.7}
    max-tokens: ${DASHSCOPE_MAX_TOKENS:4000}

  # Ollama 本地模型配置
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    model: ${OLLAMA_MODEL:llama3.2}
    temperature: ${OLLAMA_TEMPERATURE:0.7}

  # 通用配置
  common:
    timeout: ${LLM_TIMEOUT:60000}
    max-retries: ${LLM_MAX_RETRIES:3}
