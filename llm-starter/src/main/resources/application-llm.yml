# LLM 业务配置

llm:
  # 默认配置
  default-provider: ${LLM_DEFAULT_PROVIDER:openai}
  default-model: ${LLM_DEFAULT_MODEL:gpt-3.5-turbo}
  
  # OpenAI 配置
  openai:
    api-key: ${OPENAI_API_KEY:your-api-key-here}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com}
    model: ${OPENAI_MODEL:gpt-3.5-turbo}
    temperature: ${OPENAI_TEMPERATURE:0.7}
    max-tokens: ${OPENAI_MAX_TOKENS:2000}
  
  # Ollama 配置
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    model: ${OLLAMA_MODEL:llama2}
    temperature: ${OLLAMA_TEMPERATURE:0.7}
  
  # DeepSeek 配置
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:your-deepseek-api-key-here}
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    model: ${DEEPSEEK_MODEL:deepseek-chat}
    temperature: ${DEEPSEEK_TEMPERATURE:0.7}
    max-tokens: ${DEEPSEEK_MAX_TOKENS:4000}
  
  # 通用配置
  common:
    timeout: ${LLM_TIMEOUT:60000}
    max-retries: ${LLM_MAX_RETRIES:3}

