server:
  port: 8080

spring:
  application:
    name: llm-orchestration-platform
  
  # 默认激活 dev 环境
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  
  # 配置文件导入
  config:
    import:
      - classpath:application-llm.yml
      - optional:classpath:config/${spring.profiles.active}/datasource.yml
      - optional:classpath:config/${spring.profiles.active}/spring-ai.yml
      - optional:classpath:config/${spring.profiles.active}/logging.yml

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# 配置验证设置
llm:
  config:
    validation:
      # 是否启用配置验证（默认启用）
      enabled: true
      # 验证失败时是否阻止启动（默认仅警告，不阻止）
      fail-on-error: false
      # 需要验证的配置文件列表（相对于 config/{profile}/ 目录）
      required-files:
        - datasource.yml
        - spring-ai.yml
        - logging.yml
      # 需要验证的关键配置属性（用于确认配置已加载）
      required-properties:
        - spring.datasource.url
        - spring.ai.alibaba.api-key

# 文档浏览器配置
doc-viewer:
  docs-path: classpath:docs/     # 文档目录路径
  search-enabled: true            # 是否启用 AI 检索（需 Qdrant 启动）
  search-top-k: 5                 # 默认返回数量

# 秘书工具插拔配置
secretary:
  tools:
    schedule: true    # 日程管理工具
    todo: true        # 待办管理工具
    note-search: true # 笔记检索工具（复用 NoteSearchTool）
    rag-search: false # 知识库 RAG（需 Qdrant 启动）
    web-search: false # 网络搜索（需配置搜索 API Key）

