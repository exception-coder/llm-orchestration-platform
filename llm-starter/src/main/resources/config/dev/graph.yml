# ----------------------------------------------------------
# Agent 异步执行配置
# ----------------------------------------------------------
agent:
  async:
    max-concurrent: ${AGENT_ASYNC_MAX_CONCURRENT:5}
    thread-pool-size: ${AGENT_ASYNC_THREAD_POOL_SIZE:5}
    execution-timeout: ${AGENT_ASYNC_EXECUTION_TIMEOUT:120}
    task-retain-minutes: ${AGENT_ASYNC_TASK_RETAIN_MINUTES:30}
    sse-timeout: ${AGENT_ASYNC_SSE_TIMEOUT:600000}

