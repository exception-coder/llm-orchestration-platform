# 开发环境 - Spring AI Alibaba 配置

spring:
  ai:
    # 阿里云百炼（DashScope）配置 - 通义千问 / DeepSeek 等
    alibaba:
      api-key: ${DASHSCOPE_API_KEY:sk-dev-test-key-placeholder}
      base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com}
      chat:
        options:
          model: ${DASHSCOPE_MODEL:qwen-plus}
          temperature: ${DASHSCOPE_TEMPERATURE:0.7}
          max-tokens: ${DASHSCOPE_MAX_TOKENS:4000}
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:sk-dev-test-key-placeholder}
    openai:
      api-key: ${OPENAI_API_KEY:sk-dev-test-key-placeholder}


    # Ollama 本地模型配置
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        enabled: true
        options:
          model: ${OLLAMA_MODEL:llama3.2}
          temperature: ${OLLAMA_TEMPERATURE:0.7}
      embedding:
        enabled: false

    # Qdrant 向量库配置
    vectorstore:
      qdrant:
        host: ${QDRANT_HOST:localhost}
        port: ${QDRANT_PORT:6334}
        api-key: ${QDRANT_API_KEY:}
        use-tls: false
        collection-name: ${QDRANT_COLLECTION:job_postings_dev}
        initialize-schema: true
        enabled: true

    # 文档向量库配置（独立 collection）
    vectorstore-qdrant-docs:
      collection-name: ${QDRANT_COLLECTION_DOCS:docs_vectors}

    # 项目画像向量库配置（跨项目检索）
    vectorstore-qdrant-profile:
      collection-name: ${QDRANT_COLLECTION_PROFILE:project_profile}

# LLM 业务配置
llm:
  default-provider: zhipu
  default-model: glm-4-flash
  alibaba:
    api-key: ${DASHSCOPE_API_KEY:sk-dev-test-key-placeholder}
    base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com}
    model: ${DASHSCOPE_MODEL:qwen-plus}
    temperature: ${DASHSCOPE_TEMPERATURE:0.7}
    max-tokens: ${DASHSCOPE_MAX_TOKENS:4000}
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    model: ${OLLAMA_MODEL:llama3.2}
    temperature: ${OLLAMA_TEMPERATURE:0.7}
  # 智谱 AI（兼容 OpenAI 协议，用于 Chat + Embedding）
  zhipu:
    api-key: ${ZHIPU_API_KEY:sk-dev-test-key-placeholder}
    base-url: ${ZHIPU_BASE_URL:https://open.bigmodel.cn/api/paas}
    embedding-model: ${ZHIPU_EMBEDDING_MODEL:embedding-3}
    model: ${ZHIPU_MODEL:glm-4-flash}
    temperature: ${ZHIPU_TEMPERATURE:0.7}
    max-tokens: ${ZHIPU_MAX_TOKENS:4000}
  common:
    timeout: 60000
    max-retries: 3
