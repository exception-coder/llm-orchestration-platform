# 开发环境 - Spring AI 配置

spring:
  ai:
    # OpenAI 配置
    openai:
      api-key: ${OPENAI_API_KEY:sk-dev-test-key}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        enabled: true
        options:
          model: ${OPENAI_MODEL:gpt-3.5-turbo}
          temperature: ${OPENAI_TEMPERATURE:0.7}
          max-tokens: ${OPENAI_MAX_TOKENS:2000}
      embedding:
        enabled: true  # 启用 OpenAI Embedding
    
    # Ollama 配置
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        enabled: true
        options:
          model: ${OLLAMA_MODEL:llama2}
          temperature: ${OLLAMA_TEMPERATURE:0.7}
      embedding:
        enabled: true  # 启用 Ollama Embedding
    
    # Qdrant 向量库配置
    vectorstore:
      qdrant:
        host: ${QDRANT_HOST:localhost}
        port: ${QDRANT_PORT:6334}
        api-key: ${QDRANT_API_KEY:K7mN9pQ2rT5vX8zA3bC6dE9fH2jK5mN8pQ3rT6vX9zA2}
        use-tls: false
        collection-name: ${QDRANT_COLLECTION:job_postings_dev}
        initialize-schema: true

