# 开发环境 - Spring AI Alibaba 配置

spring:
  ai:
    # 阿里云百炼（DashScope）配置 - 通义千问 / DeepSeek 等
   .alibaba:
      api-key: ${DASHSCOPE_API_KEY:sk-dev-test-key-placeholder}
      base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com}
      chat:
        options:
          model: ${DASHSCOPE_MODEL:qwen-plus}
          temperature: ${DASHSCOPE_TEMPERATURE:0.7}
          max-tokens: ${DASHSCOPE_MAX_TOKENS:4000}

    # Ollama 本地模型配置
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        enabled: true
        options:
          model: ${OLLAMA_MODEL:llama3.2}
          temperature: ${OLLAMA_TEMPERATURE:0.7}
      embedding:
        enabled: true

    # Qdrant 向量库配置
    vectorstore:
      qdrant:
        host: ${QDRANT_HOST:localhost}
        port: ${QDRANT_PORT:6334}
        api-key: ${QDRANT_API_KEY:}
        use-tls: false
        collection-name: ${QDRANT_COLLECTION:job_postings_dev}
        initialize-schema: true
        enabled: true

    # 文档向量库配置（独立 collection）
    # 注意：Spring AI 1.x 可能不支持多 VectorStore Bean，
    # 如遇冲突，请在 DocVectorStoreConfig 中加 @ConditionalOnBean 检查
    vectorstore-qdrant-docs:
      host: ${QDRANT_HOST:localhost}
      port: ${QDRANT_PORT:6334}
      api-key: ${QDRANT_API_KEY:}
      use-tls: false
      collection-name-docs: ${QDRANT_COLLECTION_DOCS:docs_vectors}
      initialize-schema: true

# LLM 业务配置
llm:
  default-provider: alibaba
  default-model: qwen-plus
  alibaba:
    api-key: ${DASHSCOPE_API_KEY:sk-dev-test-key-placeholder}
    base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com}
    model: ${DASHSCOPE_MODEL:qwen-plus}
    temperature: ${DASHSCOPE_TEMPERATURE:0.7}
    max-tokens: ${DASHSCOPE_MAX_TOKENS:4000}
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    model: ${OLLAMA_MODEL:llama3.2}
    temperature: ${OLLAMA_TEMPERATURE:0.7}
  common:
    timeout: 60000
    max-retries: 3
