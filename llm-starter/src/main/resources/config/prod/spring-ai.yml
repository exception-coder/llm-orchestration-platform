# 生产环境 - Spring AI 配置

spring:
  ai:
    # OpenAI 配置
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        enabled: true
        options:
          model: ${OPENAI_MODEL:gpt-4}
          temperature: ${OPENAI_TEMPERATURE:0.3}
          max-tokens: ${OPENAI_MAX_TOKENS:2000}
      embedding:
        enabled: true  # 启用 OpenAI Embedding
    
    # Ollama 配置
    ollama:
      base-url: ${OLLAMA_BASE_URL}
      chat:
        enabled: true
        options:
          model: ${OLLAMA_MODEL:llama2}
          temperature: ${OLLAMA_TEMPERATURE:0.3}
      embedding:
        enabled: true  # 启用 Ollama Embedding
    
    # Qdrant 向量库配置
    vectorstore:
      qdrant:
        host: ${QDRANT_HOST}
        port: ${QDRANT_PORT:6334}
        api-key: ${QDRANT_API_KEY}
        use-tls: true
        collection-name: ${QDRANT_COLLECTION:job_postings}
        initialize-schema: false

