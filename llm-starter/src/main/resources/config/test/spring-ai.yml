# 测试环境 - Spring AI Alibaba 配置

spring:
  ai:
    # 阿里云百炼（DashScope）配置
    alibaba:
      api-key: ${DASHSCOPE_API_KEY}
      base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com}
      chat:
        options:
          model: ${DASHSCOPE_MODEL:qwen-plus}
          temperature: ${DASHSCOPE_TEMPERATURE:0.5}
          max-tokens: ${DASHSCOPE_MAX_TOKENS:3000}

    # Ollama 测试服务器配置
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://test-ollama-server:11434}
      chat:
        enabled: true
        options:
          model: ${OLLAMA_MODEL:llama3.2}
          temperature: ${OLLAMA_TEMPERATURE:0.5}
      embedding:
        enabled: true

    # Qdrant 向量库配置
    vectorstore:
      qdrant:
        host: ${QDRANT_HOST:test-qdrant-server}
        port: ${QDRANT_PORT:6334}
        api-key: ${QDRANT_API_KEY:}
        use-tls: true
        collection-name: ${QDRANT_COLLECTION:job_postings_test}
        initialize-schema: true
        enabled: true

    # 文档向量库配置
    vectorstore-qdrant-docs:
      collection-name: ${QDRANT_COLLECTION_DOCS:docs_vectors}

    # 项目画像向量库配置
    vectorstore-qdrant-profile:
      collection-name: ${QDRANT_COLLECTION_PROFILE:project_profile}

# LLM 业务配置
llm:
  default-provider: zhipu
  default-model: glm-4-flash
  alibaba:
    api-key: ${DASHSCOPE_API_KEY}
    base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com}
    model: ${DASHSCOPE_MODEL:qwen-plus}
    temperature: ${DASHSCOPE_TEMPERATURE:0.5}
    max-tokens: ${DASHSCOPE_MAX_TOKENS:3000}
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://test-ollama-server:11434}
    model: ${OLLAMA_MODEL:llama3.2}
    temperature: ${OLLAMA_TEMPERATURE:0.5}
  zhipu:
    api-key: ${ZHIPU_API_KEY}
    base-url: ${ZHIPU_BASE_URL:https://open.bigmodel.cn/api/paas}
    embedding-model: ${ZHIPU_EMBEDDING_MODEL:embedding-3}
    model: ${ZHIPU_MODEL:glm-4-flash}
    temperature: ${ZHIPU_TEMPERATURE:0.5}
    max-tokens: ${ZHIPU_MAX_TOKENS:3000}
  common:
    timeout: 60000
    max-retries: 3
